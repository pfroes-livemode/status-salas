<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Salas · Live Mode RJ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F5F0E8;
  --ink:#050038;
  --yellow:#FFD02F;
  --yellow-hover:#F0C000;
  --green:#D4EDDA;
  --green-text:#1A6B35;
  --red:#FDDCDC;
  --red-text:#B91C1C;
  --blue:#DBEAFE;
  --blue-text:#1E40AF;
  --orange:#FEE2CC;
  --orange-text:#C2410C;
  --gray:#E5E7EB;
  --gray-text:#6B7280;
  --border:#E2DDD4;
  --card-bg:#FFFFFF;
  --shadow:0 1px 3px rgba(5,0,56,0.08),0 1px 2px rgba(5,0,56,0.04);
  --shadow-lg:0 4px 16px rgba(5,0,56,0.12);
}
body{background:var(--cream);font-family:'Inter',sans-serif;color:var(--ink);min-height:100vh}

/* ── HEADER ── */
.header{background:var(--ink);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:28px;height:28px;background:var(--yellow);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:var(--ink);letter-spacing:-0.5px}
.header-title{color:#fff;font-weight:700;font-size:15px;letter-spacing:-0.3px}
.header-sub{color:rgba(255,255,255,0.45);font-size:12px}
.header-right{display:flex;align-items:center;gap:12px}
.user-bar{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,0.8);font-size:13px}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--yellow);object-fit:cover}
.user-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.6);font-size:11px;padding:4px 10px;border-radius:999px;cursor:pointer;font-family:inherit}
.btn-logout:hover{border-color:rgba(255,255,255,0.4);color:#fff}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 56px)}
.login-card{background:#fff;border-radius:16px;padding:48px;text-align:center;box-shadow:var(--shadow-lg);max-width:360px;width:100%}
.login-logo{width:56px;height:56px;background:var(--yellow);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:var(--ink);margin:0 auto 20px}
.login-title{font-size:20px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.login-sub{color:var(--gray-text);font-size:13px;margin-bottom:28px}
.g-signin-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--border);border-radius:999px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);transition:box-shadow .15s}
.g-signin-btn:hover{box-shadow:var(--shadow-lg)}
.g-signin-btn svg{width:18px;height:18px}

/* ── TOPBAR (filtros + timestamp) ── */
.topbar{padding:16px 24px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{background:#fff;border:1.5px solid var(--border);color:var(--gray-text);font-size:12px;font-weight:600;padding:5px 14px;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .15s}
.filter-btn:hover{border-color:var(--ink);color:var(--ink)}
.filter-btn.active{background:var(--ink);border-color:var(--ink);color:#fff}
.timestamp{font-size:11px;color:var(--gray-text);display:flex;align-items:center;gap:5px}
.pulse{width:7px;height:7px;background:#22C55E;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MAIN ── */
.main{padding:20px 24px 40px}

/* ── FLOOR SECTION ── */
.floor-section{margin-bottom:36px}
.floor-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.floor-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray-text)}
.floor-name{font-size:18px;font-weight:900;letter-spacing:-0.5px;color:var(--ink)}
.floor-divider{flex:1;height:1px;background:var(--border)}
.floor-count{font-size:11px;color:var(--gray-text);font-weight:500;white-space:nowrap}

/* ── ROOMS GRID ── */
.rooms-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray-text);margin-bottom:10px;opacity:0.7}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:20px}

/* ── ROOM CARD ── */
.room-card{background:var(--card-bg);border-radius:12px;box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden;transition:box-shadow .15s,transform .15s;cursor:default}
.room-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.card-header{padding:12px 14px 10px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-name{font-size:15px;font-weight:800;letter-spacing:-0.3px}
.card-cap{font-size:11px;color:var(--gray-text);font-weight:500;margin-top:2px;display:flex;align-items:center;gap:3px}
.status-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;letter-spacing:0.3px}
.badge-livre{background:var(--green);color:var(--green-text)}
.badge-reservado-vazio{background:var(--blue);color:var(--blue-text)}
.badge-sem-reserva-ocupado{background:var(--red);color:var(--red-text)}
.badge-reservado-ocupado{background:var(--orange);color:var(--orange-text)}
.badge-loading{background:var(--gray);color:var(--gray-text)}
.badge-sem-sensor{background:#F3F4F6;color:#9CA3AF}
.card-body{padding:12px 14px}
.card-info-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray-text);margin-bottom:5px}
.card-info-row:last-child{margin-bottom:0}
.card-info-row strong{color:var(--ink);font-weight:600}
.card-icon{width:14px;height:14px;opacity:0.5;flex-shrink:0}
.card-footer{padding:8px 14px 12px;display:flex;gap:6px}
.btn-reservar{flex:1;background:var(--yellow);color:var(--ink);border:none;border-radius:999px;font-size:12px;font-weight:700;padding:7px 0;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-reservar:hover{background:var(--yellow-hover)}
.btn-reservar:disabled{opacity:0.4;cursor:not-allowed}

/* ── CABINE CARD ── */
.cabines-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.cabine-card{background:var(--card-bg);border-radius:10px;border:1.5px solid var(--border);padding:12px 14px;box-shadow:var(--shadow);transition:box-shadow .15s}
.cabine-card:hover{box-shadow:var(--shadow-lg)}
.cabine-name{font-size:13px;font-weight:700;letter-spacing:-0.2px;margin-bottom:6px}
.cabine-status{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-livre{background:#22C55E}
.dot-ocupado{background:#EF4444}
.dot-loading{background:#D1D5DB;animation:pulse 1.5s infinite}
.dot-sem-sensor{background:#D1D5DB}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,0,56,0.5);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:420px;margin:16px;box-shadow:var(--shadow-lg)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-0.3px}
.modal-room-name{font-size:12px;color:var(--gray-text);font-weight:500;margin-top:2px}
.btn-close{background:none;border:none;cursor:pointer;color:var(--gray-text);font-size:20px;line-height:1;padding:0 4px}
.modal-body{padding:20px 24px}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--gray-text);margin-bottom:6px;display:block}
.form-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .15s}
.form-input:focus{border-color:var(--yellow)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:160px;overflow-y:auto;z-index:10;display:none}
.autocomplete-list.open{display:block}
.autocomplete-item{padding:8px 12px;font-size:13px;cursor:pointer}
.autocomplete-item:hover{background:var(--cream)}
.autocomplete-name{font-weight:600}
.autocomplete-email{font-size:11px;color:var(--gray-text)}
.msg{font-size:12px;padding:8px 12px;border-radius:6px;margin-bottom:12px;display:none}
.msg-error{background:var(--red);color:var(--red-text)}
.msg-success{background:var(--green);color:var(--green-text)}
.btn-confirmar{width:100%;background:var(--ink);color:#fff;border:none;border-radius:999px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-confirmar:hover{opacity:0.85}
.btn-confirmar:disabled{opacity:0.4;cursor:not-allowed}

/* ── EMPTY / LOADING ── */
.skeleton{background:linear-gradient(90deg,#f0ede7 25%,#e8e4dc 50%,#f0ede7 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:16px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}


/* ── TIMELINE AGENDA ── */
.card-agenda{padding:0 14px 12px;border-top:1px solid var(--border)}
.agenda-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gray-text);padding:8px 0 6px;opacity:.7}
.timeline{position:relative;padding-left:36px}
.timeline-hour{position:relative;height:32px}
.timeline-hour-label{position:absolute;left:-36px;top:-6px;font-size:9px;color:var(--gray-text);width:32px;text-align:right;font-weight:500}
.timeline-hour-line{position:absolute;left:0;top:0;right:0;height:1px;background:var(--border);opacity:.6}
.timeline-event{position:absolute;left:2px;right:0;border-radius:4px;padding:2px 6px;display:flex;align-items:center;justify-content:space-between;gap:4px;overflow:hidden;z-index:1}
.timeline-event-name{font-size:10px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.timeline-event-time{font-size:9px;font-weight:500;white-space:nowrap;opacity:.85}
.event-color-0{background:#FEF3C7;color:#92400E;border-left:3px solid #F59E0B}
.event-color-1{background:#D1FAE5;color:#065F46;border-left:3px solid #10B981}
.event-color-2{background:#DBEAFE;color:#1E40AF;border-left:3px solid #3B82F6}
.event-color-3{background:#EDE9FE;color:#5B21B6;border-left:3px solid #8B5CF6}
.event-color-4{background:#FCE7F3;color:#9D174D;border-left:3px solid #EC4899}
.event-color-5{background:#FEE2E2;color:#991B1B;border-left:3px solid #EF4444}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .header{padding:0 14px}
  .main,.topbar{padding-left:14px;padding-right:14px}
  .rooms-grid{grid-template-columns:1fr}
  .cabines-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
  .user-name{display:none}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <div class="logo-mark">LM</div>
    <div>
      <div class="header-title">Portal de Salas</div>
      <div class="header-sub">Live Mode · Rio de Janeiro</div>
    </div>
  </div>
  <div class="header-right">
    <div class="user-bar" id="user-bar" style="display:none">
      <img class="user-avatar" id="user-avatar" src="" alt="">
      <span class="user-name" id="user-name"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">LM</div>
    <div class="login-title">Portal de Salas</div>
    <div class="login-sub">Acesse com sua conta @livemode.com</div>
    <div id="g-signin-container"></div>
  </div>
</div>

<!-- PORTAL -->
<div id="portal" style="display:none">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="todos" onclick="setFilter('todos',this)">Todos</button>
      <button class="filter-btn" data-filter="5" onclick="setFilter('5',this)">5º Andar</button>
      <button class="filter-btn" data-filter="4" onclick="setFilter('4',this)">4º Andar</button>
      <button class="filter-btn" data-filter="3" onclick="setFilter('3',this)">3º Andar</button>
      <button class="filter-btn" data-filter="livres" onclick="setFilter('livres',this)">Só livres</button>
    </div>
    <div class="timestamp">
      <span class="pulse" id="pulse-dot"></span>
      <span id="last-update">Atualizando...</span>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="main-content"></div>
</div>

<!-- MODAL RESERVA -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title">Nova Reserva</div>
        <div class="modal-room-name" id="modal-room-label"></div>
      </div>
      <button class="btn-close" onclick="fecharModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="msg" id="modal-msg"></div>
      <div class="form-group">
        <label class="form-label">Responsável</label>
        <div class="autocomplete-wrap">
          <input class="form-input" id="input-nome" placeholder="Digite o nome..." autocomplete="off" oninput="onNomeInput(this.value)">
          <div class="autocomplete-list" id="autocomplete-list"></div>
        </div>
        <input type="hidden" id="input-email">
      </div>
      <div class="form-group">
        <label class="form-label">Título da reunião</label>
        <input class="form-input" id="input-titulo" placeholder="Ex: Sync de produto">
      </div>
      <div class="form-row">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Início</label>
          <input class="form-input" id="input-inicio" type="time" value="09:00">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Fim</label>
          <input class="form-input" id="input-fim" type="time" value="10:00">
        </div>
      </div>
      <div style="margin-top:20px">
        <button class="btn-confirmar" id="btn-confirmar" onclick="confirmarReserva()">Confirmar reserva</button>
      </div>
    </div>
  </div>
</div>

<!-- GOOGLE IDENTITY -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const GOOGLE_CLIENT_ID = '910928019519-b7h5m55v4oucf3oivqto6qr74udopson.apps.googleusercontent.com';
const N8N_BASE      = 'https://n8nops.livemode.com/webhook';
const CALENDAR_URL  = N8N_BASE + '/status-calendar';
const SENSORES_URL  = N8N_BASE + '/status-sensores';
const RESERVA_URL = N8N_BASE + '/reserva-sala';
const BUSCAR_USUARIOS_URL = N8N_BASE + '/buscar-usuarios-slack';
const SSO_URL = N8N_BASE + '/validate-google-token';
const SESSION_KEY = 'livemode_portal_user';
const SESSION_TTL = 30 * 24 * 60 * 60 * 1000;
const POLL_CALENDAR = 30000;  // 30s
const POLL_SENSORES = 5000;   // 5s

// ─── DEFINIÇÃO DE SALAS ───────────────────────────────────────────────────
const FLOORS = [
  {
    andar: '5',
    nome: 'Quinto Andar',
    salas: [
      { id:'natacao',              nome:'Natação',             cap:4,  calId:'c_18881mr269qv2g5ljdokkr2ccmbso@resource.calendar.google.com', sensor:'binary_sensor.sala_natacao' },
      { id:'ginastica_artistica',  nome:'Ginástica Artística', cap:4,  calId:'c_188fi7uqkgniojikiie39aqv21id0@resource.calendar.google.com', sensor:'binary_sensor.sala_ginastica_artistica' },
      { id:'triatlo',              nome:'Triatlo',             cap:4,  calId:'c_188c6isji33e8hn9j1r1hka1bkpi0@resource.calendar.google.com', sensor:'binary_sensor.sala_triatlo' },
      { id:'handebol',             nome:'Handebol',            cap:4,  calId:'c_188ae5rl4flqah4li2q40djlgp342@resource.calendar.google.com', sensor:'binary_sensor.sala_handebol' },
      { id:'atletismo',            nome:'Atletismo',           cap:4,  calId:'c_188629uhff274hv8he7v3j0si91be@resource.calendar.google.com', sensor:'binary_sensor.sala_atletismo' },
      { id:'volei',                nome:'Vôlei',               cap:4,  calId:'c_18898it1nd33khphiicnlngdh1hjo@resource.calendar.google.com', sensor:'binary_sensor.sala_volei' },
    ],
    cabines: [
      { id:'cabine_canoagem', nome:'Canoagem', sensor:'binary_sensor.cabine_canoagem' },
      { id:'cabine_futsal',   nome:'Futsal',   sensor:'binary_sensor.cabine_futsal' },
    ]
  },
  {
    andar: '4',
    nome: 'Quarto Andar',
    salas: [
      { id:'titulos',   nome:'Títulos',   cap:10, calId:'c_18893gagsmrkkhegj65851ii7k5f2@resource.calendar.google.com', sensor:'binary_sensor.sala_titulos' },
      { id:'olimpicos', nome:'Olímpicos', cap:11, calId:'c_188a8ohp2r2ogjfog7jm622h9qhek@resource.calendar.google.com', sensor:'binary_sensor.sala_olimpicos' },
    ],
    cabines: [
      { id:'cabine_badminton',         nome:'Badminton',         sensor:'binary_sensor.cabine_badminton' },
      { id:'cabine_escalada',          nome:'Escalada',          sensor:'binary_sensor.cabine_escalada' },
      { id:'cabine_futebol_americano', nome:'Futebol Americano', sensor:'binary_sensor.cabine_futebol_americano' },
      { id:'cabine_skate',             nome:'Skate',             sensor:'binary_sensor.cabine_skate' },
      { id:'cabine_tenis_de_mesa',     nome:'Tênis de Mesa',     sensor:'binary_sensor.cabine_tenis_de_mesa' },
    ]
  },
  {
    andar: '3',
    nome: 'Terceiro Andar',
    salas: [
      { id:'futebol',  nome:'Futebol',  cap:5, calId:'c_188ch77eq667gi0gmpm8q84nd7svc@resource.calendar.google.com', sensor:'binary_sensor.sala_futebol' },
      { id:'basquete', nome:'Basquete', cap:5, calId:'c_188ahgfh7d9soifdgrstga6trco2u@resource.calendar.google.com', sensor:'binary_sensor.sala_basquete' },
    ],
    cabines: [
      { id:'cabine_tenis',    nome:'Tênis',    sensor:'binary_sensor.cabine_tenis' },
      { id:'cabine_beisebol', nome:'Beisebol', sensor:'binary_sensor.cabine_beisebol' },
      { id:'cabine_remo',     nome:'Remo',     sensor:'binary_sensor.cabine_remo' },
    ]
  }
];

// ─── AUTH ─────────────────────────────────────────────────────────────────
let currentUser = null;
let pollTimer = null;
let pollTimerSensores = null;
let activeFilter = 'todos';
let roomDataCache = {};
let autocompleteTimer = null;
let currentModalRoom = null;

function initAuth() {
  const saved = localStorage.getItem(SESSION_KEY);
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (Date.now() - s.ts < SESSION_TTL) { loginSuccess(s); return; }
    } catch(e) {}
  }
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: onGoogleToken,
    auto_select: false
  });
  google.accounts.id.renderButton(
    document.getElementById('g-signin-container'),
    { theme:'outline', size:'large', shape:'pill', text:'signin_with', locale:'pt-BR' }
  );
}

function onGoogleToken(resp) {
  try {
    // Decodifica o JWT localmente — sem roundtrip ao n8n
    const b64 = resp.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    const padded = b64 + '=='.slice(0, (4 - b64.length % 4) % 4);
    const payload = JSON.parse(atob(padded));
    const email = payload.email || '';
    const hd    = payload.hd   || '';          // hosted domain do Google Workspace
    const domainOk = email.endsWith('@livemode.com') || hd === 'livemode.com';
    if (!domainOk) {
      alert('Acesso restrito a contas @livemode.com');
      return;
    }
    const user = { name: payload.name, email: payload.email, picture: payload.picture, ts: Date.now() };
    localStorage.setItem(SESSION_KEY, JSON.stringify(user));
    loginSuccess(user);
  } catch(e) {
    console.error('Auth error:', e);
    alert('Erro ao autenticar. Tente novamente.');
  }
}

function loginSuccess(user) {
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal').style.display = 'block';
  document.getElementById('user-bar').style.display = 'flex';
  document.getElementById('user-name').textContent = user.name.split(' ')[0];
  document.getElementById('user-avatar').src = user.picture || '';
  renderSkeleton();
  fetchCalendar();
  fetchSensores();
  pollTimer = setInterval(fetchCalendar, POLL_CALENDAR);
  pollTimerSensores = setInterval(fetchSensores, POLL_SENSORES);
}

function logout() {
  localStorage.removeItem(SESSION_KEY);
  clearInterval(pollTimer);
  clearInterval(pollTimerSensores);
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('portal').style.display = 'none';
  document.getElementById('user-bar').style.display = 'none';
}

// ─── FETCH STATUS ─────────────────────────────────────────────────────────
// Cache separado: calendar e sensores se mesclam antes de renderizar
let cacheCalendar = {};
let cacheSensores = {};

function mesclarEAtualizar() {
  // Mescla calendar + sensores em um único objeto para o renderPortal
  const salas = {};
  const todasSalas = Object.keys({...cacheCalendar.salas, ...cacheSensores.salas});
  todasSalas.forEach(id => {
    const cal = cacheCalendar.salas?.[id] || {};
    const sen = cacheSensores.salas?.[id] || {};
    // Agenda: garante que todos os itens têm inicio_ts válido
    const agendaBruta = Array.isArray(cal.agenda) ? cal.agenda : [];
    const agenda = agendaBruta.filter(ev => ev && (ev.inicio_ts || ev.inicio));
    // Normaliza inicio_ts/fim_ts se vierem como strings de hora (HH:MM)
    const agendaNorm = agenda.map(ev => {
      if (!ev.inicio_ts && ev.inicio) {
        // Reconstrói timestamp a partir de hora HH:MM de hoje
        const hoje = new Date().toLocaleDateString('en-CA');
        ev.inicio_ts = new Date(hoje + 'T' + ev.inicio + ':00-03:00').getTime();
        ev.fim_ts    = new Date(hoje + 'T' + ev.fim    + ':00-03:00').getTime();
      }
      return ev;
    });
    salas[id] = {
      status:     mesclarStatus(cal.status, sen),
      organizer:  cal.organizador || null,
      endTime:    cal.fim ? formatarHora(cal.fim) : null,
      hasSensor:  sen.hasSensor ?? false,
      agenda:     agendaNorm,
      temReserva: cal.temReserva ?? false,
    };
  });
  const data = { salas, cabines: cacheSensores.cabines || {} };
  roomDataCache = data;
  renderPortal(data);
}

function mesclarStatus(calStatus, sensor) {
  const temReserva  = calStatus === 'reservado';
  const temPresenca = sensor?.ocupado === true;
  if (!temReserva && !temPresenca)     return 'livre';
  if (!temReserva && temPresenca)      return 'sem_reserva_ocupado';
  if (temReserva  && !temPresenca)     return 'reservado_vazio';
  return 'reservado_ocupado';
}

async function fetchCalendar() {
  try {
    const r = await fetch(CALENDAR_URL);
    cacheCalendar = await r.json();
    mesclarEAtualizar();
    const now = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-update').textContent = 'Atualizado às ' + now;
  } catch(e) {
    document.getElementById('last-update').textContent = 'Erro ao atualizar calendar';
  }
}

async function fetchSensores() {
  try {
    const r = await fetch(SENSORES_URL);
    cacheSensores = await r.json();
    if (Object.keys(cacheCalendar).length > 0) mesclarEAtualizar();
  } catch(e) {
    // Sensores falharam — mantém último estado
  }
}


function formatarHora(isoString) {
  try {
    return new Date(isoString).toLocaleTimeString('pt-BR', {
      hour: '2-digit', minute: '2-digit', timeZone: 'America/Sao_Paulo'
    });
  } catch(e) { return null; }
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderSkeleton() {
  const main = document.getElementById('main-content');
  main.innerHTML = FLOORS.map(f => `
    <div class="floor-section">
      <div class="floor-header">
        <div class="floor-name">${f.nome}</div>
        <div class="floor-divider"></div>
      </div>
      <div class="rooms-grid">${f.salas.map(() => `
        <div class="room-card">
          <div class="card-header"><div><div class="skeleton" style="width:120px;margin-bottom:6px"></div><div class="skeleton" style="width:60px;height:10px"></div></div></div>
          <div class="card-body"><div class="skeleton" style="margin-bottom:8px"></div><div class="skeleton" style="width:70%"></div></div>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

function renderPortal(data) {
  const main = document.getElementById('main-content');
  const salas = data.salas || {};
  const cabines = data.cabines || {};

  const floorsSections = FLOORS.map(floor => {
    const show = activeFilter === 'todos' || activeFilter === floor.andar;
    if (!show && activeFilter !== 'livres') return '';

    const salaCards = floor.salas.map(sala => {
      const d = salas[sala.id] || {};
      const status = d.status || 'loading';
      const hasSensor = d.hasSensor !== false;
      if (activeFilter === 'livres' && status !== 'livre') return '';
      return renderRoomCard(sala, d, status, hasSensor);
    }).join('');

    const cabineCards = floor.cabines.map(cab => {
      const d = cabines[cab.id] || {};
      const occupied = d.occupied;
      if (activeFilter === 'livres' && occupied) return '';
      return renderCabineCard(cab, d);
    }).join('');

    const visibleSalas = floor.salas.filter(s => {
      if (activeFilter === 'livres') { const d = salas[s.id] || {}; return d.status === 'livre'; }
      return true;
    }).length;
    const visibleCabines = floor.cabines.filter(c => {
      if (activeFilter === 'livres') { const d = cabines[c.id] || {}; return !d.occupied; }
      return true;
    }).length;

    if (activeFilter === 'livres' && visibleSalas === 0 && visibleCabines === 0) return '';

    return `<div class="floor-section" data-floor="${floor.andar}">
      <div class="floor-header">
        <div>
          <div class="floor-label">Andar</div>
          <div class="floor-name">${floor.nome}</div>
        </div>
        <div class="floor-divider"></div>
        <div class="floor-count">${visibleSalas} sala${visibleSalas!==1?'s':''} · ${visibleCabines} cabine${visibleCabines!==1?'s':''}</div>
      </div>
      ${salaCards ? `<div class="rooms-label">Salas de Reunião</div><div class="rooms-grid">${salaCards}</div>` : ''}
      ${cabineCards ? `<div class="rooms-label" style="margin-top:${salaCards?'12px':'0'}">Cabines de Call</div><div class="cabines-grid">${cabineCards}</div>` : ''}
    </div>`;
  }).join('');

  main.innerHTML = floorsSections || '<div style="text-align:center;color:var(--gray-text);padding:60px 0;font-size:14px">Nenhum espaço disponível no momento.</div>';
}

function badgeClass(status) {
  return {
    'livre':               'badge-livre',
    'reservado_vazio':     'badge-reservado-vazio',
    'sem_reserva_ocupado': 'badge-sem-reserva-ocupado',
    'reservado_ocupado':   'badge-reservado-ocupado',
    'loading':             'badge-loading',
  }[status] || 'badge-loading';
}

function badgeLabel(status) {
  return {
    'livre':               '● Disponível',
    'reservado_vazio':     '● Reservado · Vazio',
    'sem_reserva_ocupado': '● Ocupado sem reserva',
    'reservado_ocupado':   '● Em uso',
    'loading':             'Carregando...',
  }[status] || 'Carregando...';
}

function renderRoomCard(sala, d, status, hasSensor) {
  const canReserve = status === 'livre';
  const sensorBadge = !hasSensor ? '<span class="status-badge badge-sem-sensor" style="font-size:9px;margin-top:4px;display:inline-block">Sensor pendente</span>' : '';

  // Organizador atual (evento em andamento)
  const organizadorAtual = d.organizer
    ? `<div class="card-info-row">
        <svg class="card-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm-5 6a5 5 0 0110 0H3z"/></svg>
        <strong>${d.organizer}</strong>
       </div>`
    : '';
  const endTime = d.endTime
    ? `<div class="card-info-row">
        <svg class="card-icon" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3.5l2 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
        Até ${d.endTime}
       </div>`
    : '';

  // Timeline da agenda do dia (08h–20h)
  const agenda = d.agenda || [];
  const timelineHtml = renderTimeline(agenda);

  return `<div class="room-card">
    <div class="card-header">
      <div>
        <div class="card-name">${sala.nome}</div>
        <div class="card-cap">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 8a2 2 0 114 0 2 2 0 01-4 0zm6 0a2 2 0 114 0 2 2 0 01-4 0zM1 14a6 6 0 0114 0H1z"/></svg>
          ${sala.cap} pessoas
        </div>
        ${sensorBadge}
      </div>
      <span class="status-badge ${badgeClass(status)}">${badgeLabel(status)}</span>
    </div>
    <div class="card-body" style="padding-bottom:8px">
      ${organizadorAtual}${endTime}
      ${!organizadorAtual ? '<div class="card-info-row" style="color:var(--gray-text)">' + (agenda.length ? 'Livre agora' : 'Sem reservas hoje') + '</div>' : ''}
    </div>
    ${timelineHtml}
    <div class="card-footer">
      <button class="btn-reservar" onclick="abrirModal('${sala.id}','${sala.nome}')" ${!canReserve?'disabled':''}>
        ${canReserve ? 'Reservar sala' : 'Indisponível'}
      </button>
    </div>
  </div>`;
}

function renderTimeline(agenda) {
  if (!agenda || agenda.length === 0) return '';

  const START_H = 8;
  const END_H   = 20;
  const TOTAL_H = END_H - START_H;
  const PX_PER_H = 32; // altura de cada hora em px

  // Gera as linhas de hora
  let horasHtml = '';
  for (let h = START_H; h <= END_H; h++) {
    const top = (h - START_H) * PX_PER_H;
    const label = h + ':00';
    horasHtml += `<div class="timeline-hour" style="height:${PX_PER_H}px">
      <span class="timeline-hour-label">${label}</span>
      <div class="timeline-hour-line"></div>
    </div>`;
  }

  // Gera os blocos de evento
  let eventosHtml = '';
  const totalH = TOTAL_H * PX_PER_H;

  agenda.forEach((ev, idx) => {
    // converte inicio_ts e fim_ts para horas decimais no fuso BRT
    const inicioDate = new Date(ev.inicio_ts);
    const fimDate    = new Date(ev.fim_ts);
    let inicioH = inicioDate.getHours() + inicioDate.getMinutes()/60;
    let fimH    = fimDate.getHours()   + fimDate.getMinutes()/60;

    // Evento de dia inteiro: inicio e fim são 00:00 — ocupa o dia todo (08-20)
    const isDiaInteiro = (inicioH === 0 && fimH === 0) || (ev.fim_ts - ev.inicio_ts >= 23 * 3600 * 1000);
    if (isDiaInteiro) { inicioH = START_H; fimH = END_H; }

    // Recorta ao range 08-20
    const top  = Math.max(0, (inicioH - START_H) * PX_PER_H);
    const bot  = Math.min(totalH, (fimH - START_H) * PX_PER_H);
    const height = Math.max(18, bot - top);

    if (bot <= 0 || top >= totalH) return; // fora do range

    const colorClass = 'event-color-' + (idx % 6);
    const nome  = ev.organizador || 'Reservado';
    const hIni  = inicioDate.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});
    const hFim  = fimDate.toLocaleTimeString('pt-BR',    {hour:'2-digit',minute:'2-digit',timeZone:'America/Sao_Paulo'});

    eventosHtml += `<div class="timeline-event ${colorClass}" style="top:${top}px;height:${height}px" title="${nome} · ${hIni}–${hFim}">
      <span class="timeline-event-name">${nome}</span>
      <span class="timeline-event-time">${hIni}–${hFim}</span>
    </div>`;
  });

  return `<div class="card-agenda">
    <div class="agenda-label">Agenda do Dia</div>
    <div class="timeline" style="height:${TOTAL_H * PX_PER_H}px;position:relative">
      ${horasHtml}
      <div style="position:absolute;inset:0;pointer-events:none">${eventosHtml}</div>
    </div>
  </div>`;
}

function renderCabineCard(cab, d) {
  const occupied = d.occupied;
  const hasSensor = d.hasSensor !== false;

  let dotClass = 'dot-sem-sensor';
  let label = 'Sensor pendente';
  if (hasSensor) {
    dotClass = occupied ? 'dot-ocupado' : 'dot-livre';
    label = occupied ? 'Ocupada' : 'Disponível';
  }

  return `<div class="cabine-card">
    <div class="cabine-name">${cab.nome}</div>
    <div class="cabine-status"><span class="dot ${dotClass}"></span>${label}</div>
  </div>`;
}

// ─── FILTER ───────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (Object.keys(roomDataCache).length > 0) renderPortal(roomDataCache);
}

// ─── MODAL ────────────────────────────────────────────────────────────────
function abrirModal(salaId, salaNome) {
  currentModalRoom = { id: salaId, nome: salaNome };
  document.getElementById('modal-room-label').textContent = salaNome;
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-msg').style.display = 'none';

  if (currentUser) {
    document.getElementById('input-nome').value = currentUser.name;
    document.getElementById('input-email').value = currentUser.email;
  }

  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const hh = pad(now.getHours()), mm = pad(now.getMinutes());
  const endH = pad(now.getHours() + 1);
  document.getElementById('input-inicio').value = `${hh}:${mm}`;
  document.getElementById('input-fim').value = `${endH}:${mm}`;
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('autocomplete-list').classList.remove('open');
  currentModalRoom = null;
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) fecharModal();
});

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────────────
function onNomeInput(val) {
  clearTimeout(autocompleteTimer);
  if (val.length < 2) { document.getElementById('autocomplete-list').classList.remove('open'); return; }
  autocompleteTimer = setTimeout(() => buscarUsuarios(val), 300);
}

async function buscarUsuarios(q) {
  try {
    const r = await fetch(`${BUSCAR_USUARIOS_URL}?q=${encodeURIComponent(q)}`);
    const list = await r.json();
    const el = document.getElementById('autocomplete-list');
    if (!list.length) { el.classList.remove('open'); return; }
    el.innerHTML = list.map(u => `<div class="autocomplete-item" onclick="selecionarUsuario('${u.name.replace(/'/g,"\'")}','${u.email}')">
      <div class="autocomplete-name">${u.name}</div>
      <div class="autocomplete-email">${u.email}</div>
    </div>`).join('');
    el.classList.add('open');
  } catch(e) {}
}

function selecionarUsuario(name, email) {
  document.getElementById('input-nome').value = name;
  document.getElementById('input-email').value = email;
  document.getElementById('autocomplete-list').classList.remove('open');
}

// ─── CONFIRMAR RESERVA ────────────────────────────────────────────────────
async function confirmarReserva() {
  const msg   = document.getElementById('modal-msg');
  const btn   = document.getElementById('btn-confirmar');
  const nome  = document.getElementById('input-nome').value.trim();
  const email = document.getElementById('input-email').value.trim();
  const titulo= document.getElementById('input-titulo').value.trim();
  const inicio= document.getElementById('input-inicio').value;
  const fim   = document.getElementById('input-fim').value;

  msg.style.display = 'none';
  if (!nome || !email || !titulo || !inicio || !fim) {
    msg.className='msg msg-error'; msg.textContent='Preencha todos os campos.'; msg.style.display='block'; return;
  }
  if (inicio >= fim) {
    msg.className='msg msg-error'; msg.textContent='O horário de fim deve ser após o início.'; msg.style.display='block'; return;
  }

  btn.textContent='Aguarde...'; btn.disabled=true;
  try {
    const today = new Date().toISOString().split('T')[0];
    const r = await fetch(RESERVA_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        salaId: currentModalRoom.id,
        salaNome: currentModalRoom.nome,
        organizer: email,
        titulo, inicio, fim, data: today
      })
    });
    const d = await r.json();
    if (!d.sucesso) {
      msg.className='msg msg-error'; msg.textContent = d.mensagem || 'Conflito de horário.'; msg.style.display='block';
    } else {
      msg.className='msg msg-success'; msg.textContent='✓ Reserva criada!'; msg.style.display='block';
      setTimeout(()=>{ fecharModal(); fetchAllStatus(); }, 1800);
    }
  } catch(e) {
    msg.className='msg msg-error'; msg.textContent='Erro ao criar reserva.'; msg.style.display='block';
  } finally {
    btn.textContent='Confirmar reserva'; btn.disabled=false;
  }
}

  if (typeof google !== 'undefined' && google.accounts) initAuth();
  else document.querySelector('script[src*="gsi"]').addEventListener('load', initAuth);
});
