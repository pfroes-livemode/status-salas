<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Sala Triatlo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 1.5rem; }
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:white; border-radius:16px; padding:28px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.2); }
        input, select { width:100%; border:1px solid #e2e8f0; border-radius:8px; padding:8px 12px; font-size:14px; font-family:'Inter',sans-serif; outline:none; box-sizing:border-box; }
        input:focus, select:focus { border-color:#1e3a5f; box-shadow:0 0 0 3px rgba(30,58,95,0.1); }
        label { font-size:12px; font-weight:600; color:#64748b; display:block; margin-bottom:4px; }
        .btn-primary { background:#1e3a5f; color:white; border:none; border-radius:8px; padding:10px 20px; font-size:14px; font-weight:600; cursor:pointer; width:100%; }
        .btn-primary:hover { background:#162d4a; }
        .btn-secondary { background:transparent; color:#64748b; border:1px solid #e2e8f0; border-radius:8px; padding:10px 20px; font-size:14px; font-weight:600; cursor:pointer; width:100%; }
        .btn-secondary:hover { background:#f8fafc; }
        .msg-success { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:8px; padding:12px; color:#166534; font-size:13px; font-weight:500; text-align:center; }
        .msg-error { background:#fff1f2; border:1px solid #fda4af; border-radius:8px; padding:12px; color:#9f1239; font-size:13px; font-weight:500; text-align:center; }
    </style>
</head>
<body class="flex items-start justify-center min-h-screen">

<!-- CARD PRINCIPAL -->
<div class="bg-white rounded-2xl shadow-lg border border-gray-100 w-full overflow-hidden" style="max-width:480px;">

    <!-- Header -->
    <div class="px-6 py-4 flex justify-between items-center" style="background:#1e3a5f;">
        <div>
            <h1 class="text-lg font-bold text-white tracking-tight">Sala Triatlo</h1>
            <div class="flex items-center gap-3 mt-0.5 text-xs text-blue-200">
                <span class="flex items-center gap-1">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    5º Andar
                </span>
                <span class="flex items-center gap-1">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    4 pessoas
                </span>
            </div>
        </div>
        <div id="status-badge" style="padding:4px 12px;border-radius:9999px;font-weight:600;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.3);">—</div>
    </div>

    <!-- Dois blocos -->
    <div class="flex" style="min-height:480px;">

        <!-- ESQUERDO — Status + Botão -->
        <div class="flex flex-col justify-between border-r border-gray-100 p-5" style="width:180px;flex-shrink:0;">
            <div class="flex flex-col items-center justify-center flex-1 text-center gap-3">
                <h2 id="status-main-text" style="font-size:1.3rem;font-weight:800;line-height:1.3;color:#9ca3af;">Conectando...</h2>
                <p id="status-sub-text" class="text-sm text-gray-400 font-medium"></p>
            </div>
            <!-- Botão Reservar -->
            <button onclick="abrirModal()" style="margin-top:16px;background:#1e3a5f;color:white;border:none;border-radius:8px;padding:9px 14px;font-size:12px;font-weight:600;cursor:pointer;width:100%;">
                + Reservar Sala
            </button>
            <div class="mt-3 text-xs text-gray-400 flex items-center gap-2">
                <span class="pulse-dot inline-block w-2 h-2 rounded-full bg-gray-300" id="status-dot"></span>
                <span id="last-update">Conectando...</span>
            </div>
        </div>

        <!-- DIREITO — Agenda -->
        <div class="flex-1 p-5 flex flex-col">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Agenda do Dia</h3>
            <div class="relative flex-1" id="timeline-container">
                <div id="events-container" class="absolute top-0 bottom-0 left-12 right-0">
                    <div id="current-time-indicator" style="display:none;position:absolute;left:0;right:0;z-index:20;align-items:center;">
                        <div style="width:8px;height:8px;border-radius:50%;background:#3b82f6;flex-shrink:0;"></div>
                        <div style="flex:1;height:2px;background:#3b82f6;opacity:.8;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DE RESERVA -->
<div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 style="font-size:16px;font-weight:700;color:#1e3a5f;">Reservar Sala Triatlo</h2>
            <button onclick="fecharModal()" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:20px;">✕</button>
        </div>

        <div style="display:flex;flex-direction:column;gap:14px;">
            <div>
                <label>Seu nome</label>
                <input type="text" id="f-organizador" placeholder="Ex: Paulo Froes">
            </div>
            <div>
                <label>Título da reunião</label>
                <input type="text" id="f-titulo" placeholder="Ex: Alinhamento semanal">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div>
                    <label>Início</label>
                    <input type="time" id="f-inicio" value="09:00">
                </div>
                <div>
                    <label>Fim</label>
                    <input type="time" id="f-fim" value="10:00">
                </div>
            </div>
            <div id="modal-msg" style="display:none;"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">
                <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn-primary" onclick="enviarReserva()" id="btn-reservar">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script>
const WEBHOOK_STATUS  = 'https://n8nops.livemode.com/webhook/status-sala-triatlo';
const WEBHOOK_RESERVA = 'https://n8nops.livemode.com/webhook/reserva-sala-triatlo';

const ui = {
    badge:      document.getElementById('status-badge'),
    mainText:   document.getElementById('status-main-text'),
    subText:    document.getElementById('status-sub-text'),
    timeline:   document.getElementById('timeline-container'),
    events:     document.getElementById('events-container'),
    curTime:    document.getElementById('current-time-indicator'),
    lastUpdate: document.getElementById('last-update'),
    dot:        document.getElementById('status-dot'),
};

const HOUR_START = 8, HOUR_END = 20, HOURS = 12;

function buildGrid() {
    for (let h = HOUR_START; h <= HOUR_END; h++) {
        const pct = ((h - HOUR_START) / HOURS) * 100;
        const row = document.createElement('div');
        row.className = 'absolute w-full flex items-start pointer-events-none';
        row.style.top = `${pct}%`;
        row.innerHTML = `
            <div style="width:48px;text-align:right;padding-right:8px;font-size:9px;color:#cbd5e1;font-family:monospace;margin-top:-8px;user-select:none;">${String(h).padStart(2,'0')}:00</div>
            <div style="flex:1;border-top:1px solid #f1f5f9;"></div>
        `;
        ui.timeline.insertBefore(row, ui.events);
    }
}
buildGrid();

function normalizeTs(ts) { return !ts ? 0 : ts > 1e11 ? ts : ts * 1000; }

function formatTime(v) {
    if (typeof v === 'string' && /^\d{2}:\d{2}/.test(v)) return v.slice(0,5);
    try { return new Date(v).toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'}); }
    catch { return '--:--'; }
}

function tsToday(h, m=0) {
    const d = new Date();
    return new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m,0).getTime();
}

const STATUS_CONFIG = {
    livre:           {label:'SEM RESERVA', main:'Sem Reserva<br>e Sala Vazia',  color:'#16a34a', dot:'bg-emerald-400'},
    ocupado:         {label:'RESERVADO',   main:'',                             color:'#ea580c', dot:'bg-orange-400'},
    reservado_vazio: {label:'RESERVADO',   main:'Reservado<br>e Sala Vazia',    color:'#2563eb', dot:'bg-blue-400'},
    uso_sem_reserva: {label:'SEM RESERVA', main:'Sem Reserva<br>e Ocupado',     color:'#dc2626', dot:'bg-rose-400'},
};

const BLOCK_COLORS = [
    {bg:'#fff1f2',border:'#fda4af',bl:'#f43f5e',text:'#9f1239',sub:'#fb7185'},
    {bg:'#fff7ed',border:'#fed7aa',bl:'#f97316',text:'#9a3412',sub:'#fb923c'},
    {bg:'#eff6ff',border:'#bfdbfe',bl:'#3b82f6',text:'#1e40af',sub:'#60a5fa'},
    {bg:'#f0fdf4',border:'#bbf7d0',bl:'#22c55e',text:'#166534',sub:'#4ade80'},
    {bg:'#faf5ff',border:'#e9d5ff',bl:'#a855f7',text:'#6b21a8',sub:'#c084fc'},
];

function updateUI(data) {
    const cfg = STATUS_CONFIG[data.status] || {label:'—',main:'Indisponível',color:'#9ca3af',dot:'bg-gray-300'};
    ui.badge.textContent = cfg.label;
    ui.dot.className = `pulse-dot inline-block w-2 h-2 rounded-full ${cfg.dot}`;
    ui.mainText.innerHTML = data.status === 'ocupado'
        ? `Reservado e<br>Ocupado<br><span style="font-size:.9em">até ${data.fim ? formatTime(data.fim) : '--:--'}</span>`
        : cfg.main;
    ui.mainText.style.cssText = `font-size:1.3rem;font-weight:800;line-height:1.3;color:${cfg.color};`;
    ui.subText.textContent = (data.status==='ocupado'||data.status==='reservado_vazio') && data.organizador
        ? `por ${data.organizador}` : '';

    document.querySelectorAll('.tl-event').forEach(e=>e.remove());
    const startMs=tsToday(HOUR_START), endMs=tsToday(HOUR_END), totalMs=endMs-startMs;

    if (Array.isArray(data.agenda)) {
        data.agenda.forEach((item,idx)=>{
            const eStart=Math.max(normalizeTs(item.inicio_ts),startMs);
            const eEnd=Math.min(normalizeTs(item.fim_ts),endMs);
            if (eEnd<=startMs||eStart>=endMs) return;
            const topPct=((eStart-startMs)/totalMs)*100;
            const hPct=((eEnd-eStart)/totalMs)*100;
            const c=BLOCK_COLORS[idx%BLOCK_COLORS.length];
            const el=document.createElement('div');
            el.className='tl-event absolute left-1 right-1 rounded-lg overflow-hidden';
            el.style.cssText=`top:calc(${topPct}% + 2px);height:calc(${Math.max(hPct,2)}% - 4px);background:${c.bg};border:1.5px solid ${c.border};border-left:4px solid ${c.bl};padding:4px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px;z-index:${idx+1};`;
            el.innerHTML=`
                <div style="font-size:11px;font-weight:700;color:${c.text};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${item.organizador||'Ocupado'}</div>
                <div style="font-size:10px;color:${c.sub};font-weight:600;white-space:nowrap;flex-shrink:0;">${item.inicio} – ${item.fim}</div>
            `;
            ui.events.appendChild(el);
        });
    }
    updateTimeIndicator();
}

function updateTimeIndicator() {
    const now=Date.now(), startMs=tsToday(HOUR_START), endMs=tsToday(HOUR_END);
    if (now>=startMs&&now<=endMs) {
        ui.curTime.style.display='flex';
        ui.curTime.style.top=`${((now-startMs)/(endMs-startMs))*100}%`;
    } else { ui.curTime.style.display='none'; }
}

async function fetchData() {
    try {
        const res=await fetch(WEBHOOK_STATUS);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const data=await res.json();
        updateUI(data);
        const now=new Date();
        ui.lastUpdate.textContent=`Atualizado às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    } catch(err) {
        const now=new Date();
        ui.lastUpdate.textContent=`Falha às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} — tentando...`;
        ui.dot.className='inline-block w-2 h-2 rounded-full bg-red-400';
    }
}

// Modal
function abrirModal() {
    document.getElementById('modal').style.display='flex';
    document.getElementById('modal-msg').style.display='none';
    document.getElementById('modal-msg').textContent='';
}

function fecharModal() {
    document.getElementById('modal').style.display='none';
}

async function enviarReserva() {
    const organizador = document.getElementById('f-organizador').value.trim();
    const titulo      = document.getElementById('f-titulo').value.trim();
    const inicio      = document.getElementById('f-inicio').value;
    const fim         = document.getElementById('f-fim').value;
    const msg         = document.getElementById('modal-msg');
    const btn         = document.getElementById('btn-reservar');

    if (!organizador || !titulo || !inicio || !fim) {
        msg.className='msg-error'; msg.textContent='Preencha todos os campos.'; msg.style.display='block'; return;
    }
    if (inicio >= fim) {
        msg.className='msg-error'; msg.textContent='O horário de fim deve ser após o início.'; msg.style.display='block'; return;
    }

    btn.textContent='Enviando...'; btn.disabled=true;

    // Monta datetime no fuso de Brasília
    const hoje = new Date().toLocaleDateString('en-CA');
    const inicioISO = `${hoje}T${inicio}:00-03:00`;
    const fimISO    = `${hoje}T${fim}:00-03:00`;

    try {
        const res = await fetch(WEBHOOK_RESERVA, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titulo, organizador, inicio: inicioISO, fim: fimISO })
        });
        const data = await res.json();
        
        if (data.sucesso === false) {
            msg.className='msg-error';
            msg.textContent = data.mensagem || 'Horário não disponível.';
            msg.style.display='block';
        } else {
            msg.className='msg-success';
            msg.textContent='✓ Reserva criada com sucesso!';
            msg.style.display='block';
            setTimeout(()=>{ fecharModal(); fetchData(); }, 2000);
        }
    } catch(err) {
        msg.className='msg-error'; msg.textContent='Erro ao criar reserva. Tente novamente.'; msg.style.display='block';
    } finally {
        btn.textContent='Confirmar'; btn.disabled=false;
    }
}

fetchData();
setInterval(fetchData, 30000);
setInterval(updateTimeIndicator, 30000);
</script>
</body>
</html>
