<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Salas · Live Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ── MIRO DESIGN TOKENS ── */
        :root {
            --canvas:     #ffffff;
            --cream:      #F5F0E8;
            --ink:        #050038;
            --steel:      #4A5568;
            --muted:      #9FA8B5;
            --hairline:   #E8EAF0;
            --hairline-soft: #F0F2F7;
            --yellow:     #FFD02F;
            --yellow-hover: #F5C400;
            --lime:       #C8F04B;
            --lilac:      #D4BBFF;
            --primary:    #050038;
            --on-primary: #ffffff;
            --radius-sm:  6px;
            --radius-md:  10px;
            --radius-lg:  16px;
            --radius-xl:  22px;
            --radius-full:9999px;
            --shadow-card: 0 2px 8px rgba(5,0,56,0.06), 0 12px 32px -4px rgba(5,0,56,0.08);
            --shadow-modal: 0 8px 48px rgba(5,0,56,0.18);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            margin: 0;
            padding: 0;
            color: var(--ink);
        }

        /* ── PULSE DOT ── */
        .pulse-dot { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

        /* ── LOGIN SCREEN ── */
        #login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            background: var(--cream);
        }

        #login-card {
            background: var(--canvas);
            border-radius: var(--radius-xl);
            padding: 48px 40px 40px;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--hairline);
        }

        #login-logo {
            width: 52px;
            height: 52px;
            background: var(--yellow);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #login-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--ink);
            margin: 0;
            letter-spacing: -0.3px;
        }

        #login-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin: 0;
            text-align: center;
            line-height: 1.5;
        }

        #login-error {
            color: #C42B1C;
            font-size: 13px;
            font-weight: 500;
            background: #FFF0EE;
            border: 1px solid #FECACA;
            border-radius: var(--radius-md);
            padding: 10px 14px;
            display: none;
            text-align: center;
            width: 100%;
        }

        #login-spinner {
            display: none;
            color: var(--muted);
            font-size: 13px;
        }

        /* ── USER BAR ── */
        #user-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--canvas);
            border-bottom: 1px solid var(--hairline);
            font-size: 13px;
        }

        #user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--yellow);
        }

        #user-name {
            font-weight: 700;
            color: var(--ink);
            font-size: 13px;
        }

        #user-email {
            color: var(--muted);
            font-size: 12px;
        }

        #btn-logout {
            margin-left: auto;
            font-size: 12px;
            color: var(--steel);
            background: none;
            border: 1px solid var(--hairline);
            border-radius: var(--radius-full);
            padding: 5px 14px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.15s;
        }
        #btn-logout:hover { background: var(--hairline-soft); }

        /* ── PORTAL WRAPPER ── */
        #portal-content {
            display: none;
            width: 100%;
            flex-direction: column;
            min-height: 100vh;
            background: var(--cream);
        }

        .portal-body {
            display: flex;
            justify-content: center;
            padding: 28px 20px 40px;
        }

        /* ── MAIN CARD ── */
        .room-card {
            background: var(--canvas);
            border-radius: var(--radius-xl);
            border: 1px solid var(--hairline);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
        }

        /* ── CARD HEADER ── */
        .card-header {
            padding: 20px 24px 18px;
            background: var(--ink);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-header h1 {
            font-size: 17px;
            font-weight: 800;
            color: var(--canvas);
            margin: 0 0 4px;
            letter-spacing: -0.2px;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        .header-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #status-badge {
            padding: 5px 12px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            background: var(--yellow);
            color: var(--ink);
            border: none;
            flex-shrink: 0;
        }

        /* ── TWO-COLUMN LAYOUT ── */
        .card-body {
            display: flex;
            min-height: 460px;
        }

        /* ── LEFT: STATUS ── */
        .status-col {
            width: 172px;
            flex-shrink: 0;
            border-right: 1px solid var(--hairline);
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .status-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            gap: 6px;
        }

        #status-main-text {
            font-size: 1.2rem;
            font-weight: 900;
            line-height: 1.25;
            color: var(--muted);
            letter-spacing: -0.3px;
        }

        #status-sub-text {
            font-size: 12px;
            color: var(--muted);
            font-weight: 500;
        }

        /* ── RESERVE BUTTON (yellow pill) ── */
        .btn-reserve {
            background: var(--yellow);
            color: var(--ink);
            border: none;
            border-radius: var(--radius-full);
            padding: 11px 16px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s;
            letter-spacing: 0.01em;
        }
        .btn-reserve:hover { background: var(--yellow-hover); }

        .status-footer {
            margin-top: 12px;
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ── RIGHT: AGENDA ── */
        .agenda-col {
            flex: 1;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .agenda-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
        }

        .timeline-wrap {
            position: relative;
            flex: 1;
        }

        #timeline-container {
            position: relative;
            flex: 1;
            height: 100%;
        }

        #events-container {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 48px;
            right: 0;
        }

        #current-time-indicator {
            display: none;
            position: absolute;
            left: 0;
            right: 0;
            z-index: 20;
            align-items: center;
        }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(5,0,56,0.45);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(2px);
        }

        .modal-box {
            background: var(--canvas);
            border-radius: var(--radius-xl);
            padding: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-modal);
            border: 1px solid var(--hairline);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .modal-header h2 {
            font-size: 16px;
            font-weight: 800;
            color: var(--ink);
            margin: 0;
            letter-spacing: -0.2px;
        }

        .modal-close {
            background: var(--hairline-soft);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--steel);
            font-size: 14px;
            transition: background 0.15s;
        }
        .modal-close:hover { background: var(--hairline); }

        /* ── FORM ELEMENTS ── */
        label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: block;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            border: 1.5px solid var(--hairline);
            border-radius: var(--radius-md);
            padding: 9px 12px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            box-sizing: border-box;
            color: var(--ink);
            background: var(--canvas);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, select:focus {
            border-color: var(--yellow);
            box-shadow: 0 0 0 3px rgba(255,208,47,0.25);
        }

        .email-display {
            background: var(--hairline-soft);
            border: 1.5px solid var(--hairline);
            border-radius: var(--radius-md);
            padding: 9px 12px;
            font-size: 13px;
            color: var(--steel);
            min-height: 38px;
            display: flex;
            align-items: center;
        }

        /* ── BUTTONS ── */
        .btn-primary {
            background: var(--ink);
            color: var(--canvas);
            border: none;
            border-radius: var(--radius-full);
            padding: 11px 20px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s;
            letter-spacing: 0.01em;
        }
        .btn-primary:hover { background: #1a0060; }

        .btn-secondary {
            background: transparent;
            color: var(--steel);
            border: 1.5px solid var(--hairline);
            border-radius: var(--radius-full);
            padding: 11px 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.15s;
        }
        .btn-secondary:hover { background: var(--hairline-soft); }

        /* ── MESSAGES ── */
        .msg-success {
            background: #F0FDF4;
            border: 1px solid #BBF7D0;
            border-radius: var(--radius-md);
            padding: 12px;
            color: #166534;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }
        .msg-error {
            background: #FFF0EE;
            border: 1px solid #FECACA;
            border-radius: var(--radius-md);
            padding: 12px;
            color: #C42B1C;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        /* ── AUTOCOMPLETE ── */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--canvas);
            border: 1.5px solid var(--hairline);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 24px rgba(5,0,56,0.12);
            z-index: 200;
            max-height: 180px;
            overflow-y: auto;
            margin-top: 4px;
        }
        .autocomplete-item {
            padding: 9px 12px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid var(--hairline-soft);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover, .autocomplete-item.selected {
            background: #FFF8D6;
        }
        .autocomplete-item .item-nome { font-weight: 700; color: var(--ink); }
        .autocomplete-item .item-email { font-size: 11px; color: var(--muted); }

        /* ── AGENDA EVENT BLOCKS (pastéis estilo sticky notes Miro) ── */
        /* overridden inline by JS — kept minimal here */
        .tl-event {
            position: absolute;
            left: 1px;
            right: 1px;
            border-radius: var(--radius-md);
            overflow: hidden;
        }
    </style>
</head>
<body>

<!-- ==================== TELA DE LOGIN ==================== -->
<div id="login-screen">
    <div id="login-card">
        <div id="login-logo">
            <!-- Ícone calendário no amarelo Miro -->
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#050038" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
        </div>
        <p id="login-title">Portal de Salas</p>
        <p id="login-subtitle">Entre com sua conta Live Mode<br>para continuar</p>

        <div id="g_id_onload"
            data-client_id="910928019519-b7h5m55v4oucf3oivqto6qr74udopson.apps.googleusercontent.com"
            data-callback="handleGoogleCredential"
            data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
            data-type="standard"
            data-size="large"
            data-theme="outline"
            data-text="signin_with"
            data-shape="rectangular"
            data-locale="pt-BR">
        </div>

        <p id="login-spinner">Validando acesso...</p>
        <p id="login-error"></p>
    </div>
</div>

<!-- ==================== PORTAL ==================== -->
<div id="portal-content">

    <!-- User bar -->
    <div id="user-bar">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
        <span id="user-email"></span>
        <button id="btn-logout" onclick="fazerLogout()">Sair</button>
    </div>

    <div class="portal-body">
        <div class="room-card">

            <!-- Header -->
            <div class="card-header">
                <div>
                    <h1>Sala Triatlo</h1>
                    <div class="header-meta">
                        <span>
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            5º Andar
                        </span>
                        <span>
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            4 pessoas
                        </span>
                    </div>
                </div>
                <div id="status-badge">—</div>
            </div>

            <!-- Body: status + agenda -->
            <div class="card-body">

                <!-- Esquerdo: Status -->
                <div class="status-col">
                    <div class="status-center">
                        <h2 id="status-main-text">Conectando...</h2>
                        <p id="status-sub-text"></p>
                    </div>
                    <div>
                        <button class="btn-reserve" onclick="abrirModal()">+ Reservar Sala</button>
                        <div class="status-footer">
                            <span class="pulse-dot inline-block w-2 h-2 rounded-full bg-gray-300" id="status-dot" style="width:8px;height:8px;border-radius:50%;background:#d1d5db;display:inline-block;flex-shrink:0;"></span>
                            <span id="last-update">Conectando...</span>

                <!-- Direito: Agenda -->
                <div class="agenda-col">
                    <div class="agenda-label">Agenda do Dia</div>
                    <div class="timeline-wrap">
                        <div class="relative flex-1" id="timeline-container" style="position:relative;height:100%;min-height:380px;">
                            <div id="events-container" style="position:absolute;top:0;bottom:0;left:48px;right:0;">
                                <div id="current-time-indicator" style="display:none;position:absolute;left:0;right:0;z-index:20;align-items:center;">
                                    <div style="width:8px;height:8px;border-radius:50%;background:var(--yellow);flex-shrink:0;"></div>
                                    <div style="flex:1;height:2px;background:var(--yellow);opacity:.8;"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- ==================== MODAL DE RESERVA ==================== -->
<div id="modal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Reservar Sala Triatlo</h2>
            <button class="modal-close" onclick="fecharModal()">✕</button>
        </div>

        <div style="display:flex;flex-direction:column;gap:14px;">
            <div>
                <label>Organizador</label>
                <div class="email-display" id="f-organizador-display" style="font-weight:700;color:var(--ink);">—</div>
                <input type="hidden" id="f-organizador">
            </div>
            <div>
                <label>E-mail</label>
                <div class="email-display" id="f-email-display">—</div>
                <input type="hidden" id="f-email">
            </div>
            <div>
                <label>Título da reunião</label>
                <input type="text" id="f-titulo" placeholder="Ex: Alinhamento semanal">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                <div>
                    <label>Início</label>
                    <input type="time" id="f-inicio" value="09:00">
                </div>
                <div>
                    <label>Fim</label>
                    <input type="time" id="f-fim" value="10:00">
                </div>
            </div>
            <div id="modal-msg" style="display:none;"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;">
                <button class="btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn-primary" onclick="enviarReserva()" id="btn-reservar">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script>
// ===================== CONFIG =====================
const WEBHOOK_STATUS   = 'https://n8nops.livemode.com/webhook/status-sala-triatlo';
const WEBHOOK_RESERVA  = 'https://n8nops.livemode.com/webhook/reserva-sala-triatlo';
const WEBHOOK_SSO      = 'https://n8nops.livemode.com/webhook/validate-google-token';
const SESSION_KEY      = 'livemode_portal_user';

// ===================== SSO =====================
let usuarioLogado = null;

window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem(SESSION_KEY);
    if (saved) {
        try {
            const session = JSON.parse(saved);
            if (session.expires > Date.now()) {
                usuarioLogado = session.user;
                mostrarPortal(usuarioLogado);
            } else {
                localStorage.removeItem(SESSION_KEY);
            }
        } catch {
            localStorage.removeItem(SESSION_KEY);
        }
    }
});

async function handleGoogleCredential(response) {
    const spinner = document.getElementById('login-spinner');
    const errorEl = document.getElementById('login-error');
    spinner.style.display = 'block';
    errorEl.style.display = 'none';

    try {
        const res = await fetch(WEBHOOK_SSO, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();

        if (data.ok) {
            usuarioLogado = data.user;
            const session = { user: data.user, expires: Date.now() + (30 * 24 * 60 * 60 * 1000) };
            localStorage.setItem(SESSION_KEY, JSON.stringify(session));
            mostrarPortal(data.user);
        } else {
            errorEl.textContent = data.reason || 'Acesso não autorizado.';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.textContent = 'Erro ao validar login. Tente novamente.';
        errorEl.style.display = 'block';
        console.error(err);
    } finally {
        spinner.style.display = 'none';
    }
}

function mostrarPortal(user) {
    document.getElementById('login-screen').style.display = 'none';
    const portal = document.getElementById('portal-content');
    portal.style.display = 'flex';

    document.getElementById('user-name').textContent = user.name;
    document.getElementById('user-email').textContent = user.email;
    if (user.picture) {
        document.getElementById('user-avatar').src = user.picture;
    }

    fetchData();
    setInterval(fetchData, 30000);
    setInterval(updateTimeIndicator, 30000);
    buildGrid();
}

function fazerLogout() {
    localStorage.removeItem(SESSION_KEY);
    usuarioLogado = null;
    location.reload();
}

// ===================== PORTAL =====================
const ui = {
    badge:      document.getElementById('status-badge'),
    mainText:   document.getElementById('status-main-text'),
    subText:    document.getElementById('status-sub-text'),
    timeline:   document.getElementById('timeline-container'),
    events:     document.getElementById('events-container'),
    curTime:    document.getElementById('current-time-indicator'),
    lastUpdate: document.getElementById('last-update'),
    dot:        document.getElementById('status-dot'),
};

const HOUR_START = 8, HOUR_END = 20, HOURS = 12;

function buildGrid() {
    for (let h = HOUR_START; h <= HOUR_END; h++) {
        const pct = ((h - HOUR_START) / HOURS) * 100;
        const row = document.createElement('div');
        row.className = 'absolute w-full flex items-start pointer-events-none';
        row.style.cssText = `position:absolute;width:100%;display:flex;align-items:flex-start;top:${pct}%;`;
        row.innerHTML = `
            <div style="width:48px;text-align:right;padding-right:8px;font-size:9px;color:#CBD5E1;font-family:monospace;margin-top:-8px;user-select:none;">${String(h).padStart(2,'0')}:00</div>
            <div style="flex:1;border-top:1px solid #F0F2F7;"></div>
        `;
        ui.timeline.insertBefore(row, ui.events);
    }
}

function normalizeTs(ts) { return !ts ? 0 : ts > 1e11 ? ts : ts * 1000; }

function formatTime(v) {
    if (typeof v === 'string' && /^\d{2}:\d{2}/.test(v)) return v.slice(0,5);
    try { return new Date(v).toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'}); }
    catch { return '--:--'; }
}

function tsToday(h, m=0) {
    const d = new Date();
    return new Date(d.getFullYear(),d.getMonth(),d.getDate(),h,m,0).getTime();
}

// Status → cores Miro pastéis (sticky-note palette)
const STATUS_CONFIG = {
    livre:           {label:'SEM RESERVA', main:'Sem Reserva<br>e Sala Vazia',  color:'#16a34a', dot:'#4ADE80',  badge:'#C8F04B'},
    ocupado:         {label:'RESERVADO',   main:'',                             color:'#EA580C', dot:'#FB923C',  badge:'#FFD02F'},
    reservado_vazio: {label:'RESERVADO',   main:'Reservado<br>e Sala Vazia',    color:'#2563EB', dot:'#60A5FA',  badge:'#D4BBFF'},
    uso_sem_reserva: {label:'SEM RESERVA', main:'Sem Reserva<br>e Ocupado',     color:'#DC2626', dot:'#F87171',  badge:'#FECACA'},
};

// Event block colors — sticky note pastels
const BLOCK_COLORS = [
    {bg:'#FFF8D6',border:'#FFE580',bl:'#FFD02F',text:'#7A5C00',sub:'#B38A00'},
    {bg:'#EDF8F0',border:'#BBF7D0',bl:'#22C55E',text:'#166534',sub:'#4ADE80'},
    {bg:'#F0EEFF',border:'#DDD5FF',bl:'#8B5CF6',text:'#4C1D95',sub:'#A78BFA'},
    {bg:'#FFF0F0',border:'#FCA5A5',bl:'#EF4444',text:'#991B1B',sub:'#F87171'},
    {bg:'#E8F7FF',border:'#BAE6FD',bl:'#38BDF8',text:'#0C4A6E',sub:'#7DD3FC'},
];

function updateUI(data) {
    const cfg = STATUS_CONFIG[data.status] || {label:'—',main:'Indisponível',color:'#9CA3AF',dot:'#D1D5DB',badge:'#E5E7EB'};

    ui.badge.textContent = cfg.label;
    ui.badge.style.background = cfg.badge;
    ui.badge.style.color = '#050038';

    ui.dot.style.background = cfg.dot;

    ui.mainText.innerHTML = data.status === 'ocupado'
        ? `Reservado e<br>Ocupado<br><span style="font-size:.85em">até ${data.fim ? formatTime(data.fim) : '--:--'}</span>`
        : cfg.main;
    ui.mainText.style.cssText = `font-size:1.2rem;font-weight:900;line-height:1.25;color:${cfg.color};letter-spacing:-0.3px;`;
    ui.subText.textContent = (data.status==='ocupado'||data.status==='reservado_vazio') && data.organizador
        ? `por ${data.organizador}` : '';

    document.querySelectorAll('.tl-event').forEach(e=>e.remove());
    const startMs=tsToday(HOUR_START), endMs=tsToday(HOUR_END), totalMs=endMs-startMs;

    if (Array.isArray(data.agenda)) {
        data.agenda.forEach((item,idx)=>{
            const eStart=Math.max(normalizeTs(item.inicio_ts),startMs);
            const eEnd=Math.min(normalizeTs(item.fim_ts),endMs);
            if (eEnd<=startMs||eStart>=endMs) return;
            const topPct=((eStart-startMs)/totalMs)*100;
            const hPct=((eEnd-eStart)/totalMs)*100;
            const c=BLOCK_COLORS[idx%BLOCK_COLORS.length];
            const el=document.createElement('div');
            el.className='tl-event';
            el.style.cssText=`position:absolute;left:1px;right:1px;border-radius:8px;overflow:hidden;top:calc(${topPct}% + 2px);height:calc(${Math.max(hPct,2)}% - 4px);background:${c.bg};border:1.5px solid ${c.border};border-left:4px solid ${c.bl};padding:4px 8px;display:flex;align-items:center;justify-content:space-between;gap:6px;z-index:${idx+1};`;
            el.innerHTML=`
                <div style="font-size:11px;font-weight:700;color:${c.text};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${item.organizador||'Ocupado'}</div>
                <div style="font-size:10px;color:${c.sub};font-weight:600;white-space:nowrap;flex-shrink:0;">${item.inicio} – ${item.fim}</div>
            `;
            ui.events.appendChild(el);
        });
    }
    updateTimeIndicator();
}

function updateTimeIndicator() {
    const now=Date.now(), startMs=tsToday(HOUR_START), endMs=tsToday(HOUR_END);
    if (now>=startMs&&now<=endMs) {
        ui.curTime.style.display='flex';
        ui.curTime.style.top=`${((now-startMs)/(endMs-startMs))*100}%`;
    } else { ui.curTime.style.display='none'; }
}

async function fetchData() {
    try {
        const res=await fetch(WEBHOOK_STATUS);
        if (!res.ok) throw new Error('HTTP '+res.status);
        const data=await res.json();
        updateUI(data);
        const now=new Date();
        ui.lastUpdate.textContent=`Atualizado às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    } catch(err) {
        const now=new Date();
        ui.lastUpdate.textContent=`Falha às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} — tentando...`;
        ui.dot.style.background='#F87171';
    }
}

// ===================== MODAL =====================
function abrirModal() {
    document.getElementById('modal').style.display='flex';
    document.getElementById('modal-msg').style.display='none';
    document.getElementById('modal-msg').textContent='';

    if (usuarioLogado) {
        document.getElementById('f-organizador').value = usuarioLogado.name;
        document.getElementById('f-organizador-display').textContent = usuarioLogado.name;
        document.getElementById('f-email').value = usuarioLogado.email;
        document.getElementById('f-email-display').textContent = usuarioLogado.email;
    }
}

function fecharModal() {
    document.getElementById('modal').style.display='none';
}

async function enviarReserva() {
    const organizador = document.getElementById('f-organizador').value.trim();
    const email       = document.getElementById('f-email').value.trim();
    const titulo      = document.getElementById('f-titulo').value.trim();
    const inicio      = document.getElementById('f-inicio').value;
    const fim         = document.getElementById('f-fim').value;
    const msg         = document.getElementById('modal-msg');
    const btn         = document.getElementById('btn-reservar');

    if (!organizador || !email) {
        msg.className='msg-error'; msg.textContent='Erro: usuário não identificado.'; msg.style.display='block'; return;
    }
    if (!titulo || !inicio || !fim) {
        msg.className='msg-error'; msg.textContent='Preencha todos os campos.'; msg.style.display='block'; return;
    }
    if (inicio >= fim) {
        msg.className='msg-error'; msg.textContent='O horário de fim deve ser após o início.'; msg.style.display='block'; return;
    }

    btn.textContent='Enviando...'; btn.disabled=true;

    const hoje = new Date().toLocaleDateString('en-CA');
    const inicioISO = `${hoje}T${inicio}:00-03:00`;
    const fimISO    = `${hoje}T${fim}:00-03:00`;

    try {
        const res = await fetch(WEBHOOK_RESERVA, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ titulo, organizador, email, inicio: inicioISO, fim: fimISO })
        });
        const data = await res.json();

        if (data.sucesso === false) {
            msg.className='msg-error';
            msg.textContent = data.mensagem || 'Horário não disponível.';
            msg.style.display='block';
        } else {
            msg.className='msg-success';
            msg.textContent='✓ Reserva criada com sucesso!';
            msg.style.display='block';
            setTimeout(()=>{ fecharModal(); fetchData(); }, 2000);
        }
    } catch(err) {
        msg.className='msg-error'; msg.textContent='Erro ao criar reserva. Tente novamente.'; msg.style.display='block';
    } finally {
        btn.textContent='Confirmar'; btn.disabled=false;
    }
}
</script>
